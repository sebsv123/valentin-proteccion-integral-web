name: Weekly Rebuild for Blog Publication
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Verify deploy hook secret is configured
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set. Configure it in Settings > Secrets and variables > Actions before this workflow can run."
            exit 1
          fi

      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
